<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f3f4f6; min-height: 100vh; padding: 24px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 22px; color: #1f2937; display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* Status bar */
  .status-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; flex-wrap: wrap; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected { background: #22c55e; box-shadow: 0 0 0 3px #bbf7d0; animation: pulse 2s infinite; }
  .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 0 3px #fecaca; }
  .status-dot.checking { background: #f59e0b; box-shadow: 0 0 0 3px #fde68a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .status-text { font-size: 14px; color: #374151; font-weight: 500; }
  .status-sep { width: 1px; height: 20px; background: #e5e7eb; }

  /* Model selector */
  .model-section { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
  .model-section label { font-size: 13px; color: #6b7280; white-space: nowrap; }
  .model-select { flex: 1; padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; background: white; color: #1f2937; cursor: pointer; }
  .model-select:focus { outline: none; border-color: #8b5cf6; }
  .model-input { flex: 1; padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; background: white; color: #1f2937; }
  .model-input:focus { outline: none; border-color: #8b5cf6; }
  .refresh-btn { padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; color: #6b7280; white-space: nowrap; }
  .refresh-btn:hover { background: #f3f4f6; }

  .dark-btn { padding: 7px 14px; border: none; border-radius: 8px; cursor: pointer; background: #e5e7eb; color: #374151; font-size: 13px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:768px){ .grid { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-header h2 { font-size: 17px; color: #1f2937; }
  .btn-sm { padding: 4px 12px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; background: #f3f4f6; color: #374151; }
  .btn-sm:hover { background: #e5e7eb; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; }
  .toolbar button { padding: 5px 7px; border: none; border-radius: 4px; cursor: pointer; background: transparent; color: #6b7280; font-size: 14px; min-width: 28px; }
  .toolbar button:hover { background: #e5e7eb; color: #1f2937; }
  .toolbar select { padding: 4px 6px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 13px; background: white; color: #374151; }
  .sep { width: 1px; background: #e5e7eb; margin: 0 2px; align-self: stretch; }
  .editor { width: 100%; min-height: 300px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; font-family: Arial; font-size: 16px; line-height: 1.6; outline: none; overflow-y: auto; }
  .editor:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.15); }
  .editor ul { list-style: disc; padding-right: 24px; margin: 6px 0; }
  .editor ol { list-style: decimal; padding-right: 24px; margin: 6px 0; }
  mark { padding: 2px 0; border-radius: 2px; cursor: pointer; }
  mark:hover { filter: brightness(0.85); }
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .char-count { font-size: 13px; color: #9ca3af; }
  .analyze-btn { padding: 9px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; display: flex; align-items: center; gap: 8px; }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .analyze-btn:not(:disabled):hover { opacity: 0.9; }
  .error { margin-top: 10px; padding: 10px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; color: #dc2626; font-size: 13px; }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tab { padding: 4px 12px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #f3f4f6; color: #374151; }
  .tab.active { color: white; }
  .suggestions-list { display: flex; flex-direction: column; gap: 10px; max-height: 360px; overflow-y: auto; }
  .suggestion-card { padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; }
  .suggestion-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .cat-badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; color: white; }
  .suggestion-actions { display: flex; gap: 4px; }
  .accept-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; background: #dcfce7; color: #16a34a; font-size: 13px; }
  .accept-btn:hover { background: #bbf7d0; }
  .reject-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; background: #fee2e2; color: #dc2626; font-size: 13px; }
  .reject-btn:hover { background: #fecaca; }
  .diff { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 5px; flex-wrap: wrap; }
  .issue-text { text-decoration: line-through; color: #ef4444; }
  .suggestion-text { font-weight: 600; color: #16a34a; }
  .explanation { font-size: 13px; color: #6b7280; }
  .empty { text-align: center; padding: 40px 0; color: #9ca3af; font-size: 14px; }
  .apply-all { width: 100%; margin-top: 12px; padding: 9px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #22c55e, #10b981); color: white; }
  .tooltip { position: absolute; z-index: 100; background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); width: 270px; }

  /* Dark */
  body.dark { background: #111827; }
  body.dark .status-bar { background: #1f2937; }
  body.dark .status-text { color: #d1d5db; }
  body.dark .status-sep { background: #374151; }
  body.dark .model-select,.model-input { background: #374151; color: #d1d5db; border-color: #4b5563; }
  body.dark .refresh-btn { background: #374151; color: #9ca3af; border-color: #4b5563; }
  body.dark .refresh-btn:hover { background: #4b5563; }
  body.dark .model-section label { color: #9ca3af; }
  body.dark .card { background: #1f2937; }
  body.dark .card-header h2 { color: #f9fafb; }
  body.dark .header h1 { color: #f9fafb; }
  body.dark .editor { background: #111827; border-color: #374151; color: #f9fafb; }
  body.dark .toolbar { background: #111827; border-color: #374151; }
  body.dark .toolbar button { color: #9ca3af; }
  body.dark .toolbar button:hover { background: #374151; color: #f9fafb; }
  body.dark .toolbar select { background: #374151; color: #d1d5db; border-color: #4b5563; }
  body.dark .tab { background: #374151; color: #d1d5db; }
  body.dark .suggestion-card { background: #111827; border-color: #374151; }
  body.dark .explanation { color: #9ca3af; }
  body.dark .empty { color: #6b7280; }
  body.dark .dark-btn { background: #374151; color: #fbbf24; }
  body.dark .btn-sm { background: #374151; color: #d1d5db; }
  body.dark .sep { background: #374151; }
  body.dark .tooltip { background: #1f2937; border-color: #374151; color: #f9fafb; }
  body.dark .char-count { color: #6b7280; }
</style>
</head>
<body>

<div class="header">
  <h1>✦ Writing Assistant</h1>
  <div class="header-right">
    <button class="dark-btn" onclick="toggleDark()">🌙 داكن</button>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-dot checking" id="statusDot"></div>
  <span class="status-text" id="statusText">جاري الفحص...</span>
  <div class="status-sep"></div>
  <div class="model-section">
    <label>النموذج:</label>
    <select class="model-select" id="modelSelect" onchange="onModelSelectChange()">
      <option value="">-- اختر نموذج --</option>
    </select>
    <input class="model-input" id="modelInput" placeholder="أو اكتب اسم النموذج" style="display:none" />
    <button class="refresh-btn" onclick="checkOllama()">↻ تحديث</button>
  </div>
</div>

<div class="grid">
  <!-- Editor -->
  <div class="card">
    <div class="card-header">
      <h2>النص</h2>
      <div style="display:flex;gap:6px">
        <button class="btn-sm" onclick="loadSample()">📄 مثال</button>
        <button class="btn-sm" onclick="copyText()">📋 نسخ</button>
      </div>
    </div>
    <div class="toolbar">
      <select onchange="fmt('fontName', this.value)">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times NR</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="Verdana">Verdana</option>
      </select>
      <select onchange="fmt('fontSize', this.value)">
        <option value="13.33px">10</option>
        <option value="14.67px">11</option>
        <option value="16px" selected>12</option>
        <option value="18.67px">14</option>
        <option value="21.33px">16</option>
        <option value="24px">18</option>
        <option value="32px">24</option>
      </select>
      <div class="sep"></div>
      <button onmousedown="e=event;e.preventDefault();fmt('bold')" title="Bold"><b>B</b></button>
      <button onmousedown="e=event;e.preventDefault();fmt('italic')" title="Italic"><i>I</i></button>
      <button onmousedown="e=event;e.preventDefault();fmt('underline')" title="Underline"><u>U</u></button>
      <div class="sep"></div>
      <button onmousedown="e=event;e.preventDefault();fmt('justifyRight')">⇥</button>
      <button onmousedown="e=event;e.preventDefault();fmt('justifyCenter')">≡</button>
      <button onmousedown="e=event;e.preventDefault();fmt('justifyLeft')">⇤</button>
      <div class="sep"></div>
      <button onmousedown="e=event;e.preventDefault();fmt('insertUnorderedList')">•</button>
      <button onmousedown="e=event;e.preventDefault();fmt('insertOrderedList')">1.</button>
      <button onmousedown="e=event;e.preventDefault();fmt('outdent')">⇤⇤</button>
      <button onmousedown="e=event;e.preventDefault();fmt('indent')">⇥⇥</button>
    </div>
    <div id="editor" class="editor" contenteditable="true"
      oninput="updateCount()"
      onpaste="handlePaste(event)"
      oncopy="handleCopy(event)"
      onclick="handleEditorClick(event)">
    </div>
    <div class="footer">
      <span class="char-count"><span id="charCount">0</span> حرف</span>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">✦ تحليل النص</button>
    </div>
    <div id="errorBox" style="display:none" class="error"></div>
    <div id="tooltip" class="tooltip" style="display:none;position:absolute"></div>
  </div>

  <!-- Suggestions -->
  <div class="card" style="position:relative">
    <div class="card-header">
      <h2>الاقتراحات</h2>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="suggestions-list" id="suggestionsList">
      <div class="empty">اضغط "تحليل النص" للحصول على اقتراحات</div>
    </div>
    <button class="apply-all" id="applyAllBtn" style="display:none" onclick="applyAll()">✓ تطبيق كل الاقتراحات</button>
  </div>
</div>

<script>
const OLLAMA_BASE = "http://localhost:11434";
const DEFAULT_MODEL = "minimax-m2.7:cloud";

const CAT_COLORS = { grammar:"#3b82f6", spelling:"#ef4444", punctuation:"#f59e0b", style:"#22c55e", clarity:"#6366f1" };
const CAT_LABELS = { grammar:"قواعد", spelling:"إملاء", punctuation:"ترقيم", style:"أسلوب", clarity:"وضوح" };

let suggestions = [];
let activeTab = "all";
let isDark = false;
let currentModel = DEFAULT_MODEL;
let isConnected = false;

const editor = document.getElementById("editor");
editor.innerHTML = "<div><br></div>";

// ── Ollama Status ─────────────────────────────────────
async function checkOllama() {
  setStatus("checking", "جاري الفحص...");
  try {
    const res = await fetch(`${OLLAMA_BASE}/api/tags`, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    isConnected = true;

    // populate model list
    const models = (data.models || []).map(m => m.name);
    const sel = document.getElementById("modelSelect");
    sel.innerHTML = `<option value="">-- اختر نموذج --</option>`;
    models.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m;
      if (m === currentModel) opt.selected = true;
      sel.appendChild(opt);
    });

    // add "custom" option
    const custom = document.createElement("option");
    custom.value = "__custom__"; custom.textContent = "✎ كتابة اسم يدوي...";
    sel.appendChild(custom);

    // if currentModel not in list, show it anyway
    if (!models.includes(currentModel)) {
      const opt = document.createElement("option");
      opt.value = currentModel; opt.textContent = currentModel; opt.selected = true;
      sel.insertBefore(opt, sel.children[1]);
    }

    setStatus("connected", `متصل  •  ${models.length} نموذج`);
  } catch {
    isConnected = false;
    setStatus("disconnected", "Ollama غير متصل — شغّل: OLLAMA_ORIGINS=* ollama serve");
    document.getElementById("modelSelect").innerHTML = `<option value="${DEFAULT_MODEL}">${DEFAULT_MODEL}</option>`;
  }
}

function setStatus(state, text) {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  dot.className = "status-dot " + state;
  txt.textContent = text;
}

function onModelSelectChange() {
  const sel = document.getElementById("modelSelect");
  const inp = document.getElementById("modelInput");
  if (sel.value === "__custom__") {
    inp.style.display = "block";
    inp.value = "";
    inp.focus();
    inp.onchange = () => { currentModel = inp.value.trim() || DEFAULT_MODEL; };
    inp.onblur = () => { if (inp.value.trim()) currentModel = inp.value.trim(); };
  } else {
    inp.style.display = "none";
    currentModel = sel.value || DEFAULT_MODEL;
  }
}

// ── Helpers ───────────────────────────────────────────
function getPlainText() {
  const d = document.createElement("div");
  d.innerHTML = editor.innerHTML;
  d.querySelectorAll("mark").forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  return d.textContent || "";
}

function updateCount() {
  document.getElementById("charCount").textContent = getPlainText().length;
  document.getElementById("tooltip").style.display = "none";
}

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle("dark", isDark);
  document.querySelector(".dark-btn").textContent = isDark ? "☀️ فاتح" : "🌙 داكن";
}

function fmt(cmd, val = null) {
  editor.focus();
  if (cmd === "fontSize") {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount || sel.getRangeAt(0).collapsed) return;
    const r = sel.getRangeAt(0);
    const span = document.createElement("span");
    span.style.fontSize = val;
    span.appendChild(r.extractContents());
    r.insertNode(span);
  } else {
    document.execCommand(cmd, false, val);
  }
  editor.focus(); updateCount();
}

function loadSample() {
  const s = `قبل تشغيل اللعبه\nافتح مكان تثبيت اللعبه هتلاقي التطبيق بالإسم الآتي EdgeScroller.exe\nشغّل التطبيق كمسؤول ومن ثم قم بتشغيل اللعبة وستعمل خاصية التحريك بالحواف بشكل سلس.\n\nاو زر الويندوز ومن ثم قم بالبحث عن التطبيق بالإسم الآتي EdgeScroller.exe وضغط تشغيل كمسؤول.`;
  editor.innerHTML = s.split("\n\n").map(p =>
    `<div style="font-family:Arial;font-size:16px">${p.split("\n").join("<br>")}</div>`
  ).join("<div><br></div>");
  updateCount();
}

function copyText() {
  const d = document.createElement("div");
  d.innerHTML = editor.innerHTML;
  d.querySelectorAll("mark").forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  navigator.clipboard.writeText(d.textContent).then(() => alert("تم النسخ!"));
}

function handlePaste(e) {
  e.preventDefault();
  const txt = e.clipboardData.getData("text/plain");
  if (!txt) return;
  const html = txt.split(/\n\n+/).map(p =>
    `<div style="font-family:Arial;font-size:16px">${p.split("\n").filter(l => l.trim()).join("<br>")}</div>`
  ).join("<div><br></div>");
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  sel.deleteFromDocument();
  const r = sel.getRangeAt(0);
  r.insertNode(r.createContextualFragment(html));
  r.collapse(false); sel.removeAllRanges(); sel.addRange(r);
  updateCount();
}

function handleCopy(e) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const d = document.createElement("div");
  d.appendChild(sel.getRangeAt(0).cloneContents());
  d.querySelectorAll("mark").forEach(m => { const s = document.createElement("span"); s.innerHTML = m.innerHTML; m.replaceWith(s); });
  e.clipboardData.setData("text/plain", d.textContent);
  e.clipboardData.setData("text/html", d.innerHTML);
  e.preventDefault();
}

// ── Highlights ────────────────────────────────────────
function applyHighlights() {
  let html = editor.innerHTML.replace(/<mark[^>]*>(.*?)<\/mark>/gs, "$1");
  suggestions.forEach(s => {
    const color = CAT_COLORS[s.category] || "#9333ea";
    const esc = s.issue.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    html = html.replace(new RegExp(esc),
      `<mark data-issue="${encodeURIComponent(s.issue)}" style="background:${color}33;border-bottom:2px solid ${color};cursor:pointer">${s.issue}</mark>`
    );
  });
  editor.innerHTML = html;
}

function handleEditorClick(e) {
  if (e.target.tagName !== "MARK") { document.getElementById("tooltip").style.display = "none"; return; }
  const issue = decodeURIComponent(e.target.getAttribute("data-issue") || "");
  const s = suggestions.find(x => x.issue === issue);
  if (!s) return;
  const rect = e.target.getBoundingClientRect();
  const cardRect = editor.closest(".card").getBoundingClientRect();
  let top = rect.top - cardRect.top - 10;
  let left = rect.left - cardRect.left + rect.width / 2 - 135;
  if (left < 5) left = 5;
  if (left + 270 > cardRect.width - 5) left = cardRect.width - 275;
  const below = top < 130;
  const tip = document.getElementById("tooltip");
  const color = CAT_COLORS[s.category] || "#9333ea";
  tip.innerHTML = `
    <span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;color:white;background:${color};margin-bottom:8px">${CAT_LABELS[s.category]||s.category}</span>
    <div style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:6px;flex-wrap:wrap">
      <span style="text-decoration:line-through;color:#ef4444">${s.issue}</span>
      <span style="color:#9ca3af">→</span>
      <span style="font-weight:600;color:#16a34a">${s.suggestion}</span>
    </div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:10px">${s.explanation}</p>
    <div style="display:flex;gap:6px">
      <button class="accept-btn" onclick='applySuggestion(${JSON.stringify(s).replace(/"/g,"&quot;")})'>✓ قبول</button>
      <button class="reject-btn" onclick='dismissSuggestion(${JSON.stringify(s).replace(/"/g,"&quot;")})'>✗ رفض</button>
      <button class="btn-sm" onclick="document.getElementById('tooltip').style.display='none'">إغلاق</button>
    </div>`;
  tip.style.top = (below ? rect.bottom - cardRect.top + 10 : top - 150) + "px";
  tip.style.left = left + "px";
  tip.style.display = "block";
}

// ── Analyze ───────────────────────────────────────────
async function analyze() {
  const text = getPlainText().trim();
  if (!text) { showError("من فضلك أدخل نصاً"); return; }
  if (!currentModel) { showError("اختر نموذجاً أولاً"); return; }

  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true; btn.innerHTML = "⏳ جاري التحليل...";
  hideError(); suggestions = []; renderSuggestions();

  try {
    const res = await fetch(`${OLLAMA_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: currentModel,
        stream: false,
        messages: [
          { role: "system", content: "You are a writing assistant. Return ONLY a raw JSON array with no markdown, no code fences, no explanation. If no issues, return []." },
          { role: "user", content: `Analyze this text for grammar, spelling, punctuation, style, and clarity. Return a JSON array where each item has: category (grammar/spelling/punctuation/style/clarity), issue (exact text), suggestion (corrected), explanation (in same language as text). Ignore code blocks and technical terms.\n\nText:\n${text}` }
        ]
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const raw = (data.message?.content || "").replace(/```[\w]*\n?/g,"").replace(/```/g,"").trim();
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error("الرد مش array");
    suggestions = parsed;
    applyHighlights();
    renderSuggestions();
  } catch (err) {
    showError(`خطأ: ${err.message}`);
  } finally {
    btn.disabled = false; btn.innerHTML = "✦ تحليل النص";
  }
}

// ── Suggestions UI ────────────────────────────────────
function renderSuggestions() {
  const tabs = document.getElementById("tabs");
  const list = document.getElementById("suggestionsList");
  const applyAllBtn = document.getElementById("applyAllBtn");
  const cats = ["all","grammar","spelling","punctuation","style","clarity"];
  const catLabels = { all:"الكل", ...CAT_LABELS };

  tabs.innerHTML = cats.map(c => {
    const count = c === "all" ? suggestions.length : suggestions.filter(s => s.category === c).length;
    const color = c === "all" ? "#8b5cf6" : (CAT_COLORS[c] || "#8b5cf6");
    return `<button class="tab ${activeTab===c?"active":""}" style="${activeTab===c?`background:${color};`:""}"
      onclick="setTab('${c}')">${catLabels[c]}${count>0?` (${count})`:""}</button>`;
  }).join("");

  const filtered = activeTab === "all" ? suggestions : suggestions.filter(s => s.category === activeTab);
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${suggestions.length===0?'اضغط "تحليل النص" للحصول على اقتراحات':"لا توجد اقتراحات في هذا التصنيف"}</div>`;
    applyAllBtn.style.display = "none"; return;
  }

  list.innerHTML = filtered.map(s => {
    const color = CAT_COLORS[s.category] || "#9333ea";
    const sj = JSON.stringify(s).replace(/"/g,"&quot;");
    return `<div class="suggestion-card">
      <div class="suggestion-top">
        <span class="cat-badge" style="background:${color}">${CAT_LABELS[s.category]||s.category}</span>
        <div class="suggestion-actions">
          <button class="accept-btn" onclick='applySuggestion(${sj})'>✓</button>
          <button class="reject-btn" onclick='dismissSuggestion(${sj})'>✗</button>
        </div>
      </div>
      <div class="diff">
        <span class="issue-text">${s.issue}</span>
        <span style="color:#9ca3af">→</span>
        <span class="suggestion-text">${s.suggestion}</span>
      </div>
      <p class="explanation">${s.explanation}</p>
    </div>`;
  }).join("");
  applyAllBtn.style.display = "block";
}

function setTab(tab) { activeTab = tab; renderSuggestions(); }

function applySuggestion(s) {
  if (typeof s === "string") s = JSON.parse(s);
  let html = editor.innerHTML.replace(/<mark[^>]*>(.*?)<\/mark>/gs, "$1");
  editor.innerHTML = html.replace(s.issue, s.suggestion);
  suggestions = suggestions.filter(x => x.issue !== s.issue);
  applyHighlights(); renderSuggestions();
  document.getElementById("tooltip").style.display = "none";
  updateCount();
}

function dismissSuggestion(s) {
  if (typeof s === "string") s = JSON.parse(s);
  suggestions = suggestions.filter(x => x.issue !== s.issue);
  applyHighlights(); renderSuggestions();
  document.getElementById("tooltip").style.display = "none";
}

function applyAll() {
  let html = editor.innerHTML.replace(/<mark[^>]*>(.*?)<\/mark>/gs, "$1");
  suggestions.forEach(s => { html = html.replace(s.issue, s.suggestion); });
  editor.innerHTML = html; suggestions = [];
  renderSuggestions(); updateCount();
}

function showError(msg) { const b = document.getElementById("errorBox"); b.textContent = msg; b.style.display = "block"; }
function hideError() { document.getElementById("errorBox").style.display = "none"; }

// ── Init ──────────────────────────────────────────────
renderSuggestions();
checkOllama();
setInterval(checkOllama, 15000); // فحص كل 15 ثانية
</script>
